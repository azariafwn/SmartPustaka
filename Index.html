<!DOCTYPE html>
<html lang="id">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPustaka Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>

    
    <body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
        <a class="navbar-brand" href="#">SmartPustaka Admin</a>
        <span class="navbar-text text-light fw-bold" id="system-status">Sistem: Siap</span>
        </div>
    </nav>

    <div class="container mt-4 bg-white p-4 rounded shadow-sm">
        <ul class="nav nav-tabs" id="myTab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="transaksi-tab" data-bs-toggle="tab" data-bs-target="#transaksi" type="button" role="tab">Transaksi</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="buku-tab" data-bs-toggle="tab" data-bs-target="#buku" type="button" role="tab">Data Buku</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="anggota-tab" data-bs-toggle="tab" data-bs-target="#anggota" type="button" role="tab">Data Anggota</button>
        </li>
        </ul>

        <div class="tab-content mt-3" id="myTabContent">
        
        <div class="tab-pane fade show active" id="transaksi" role="tabpanel">
            <h4>Riwayat Transaksi Aktif</h4>
            <table class="table table-striped table-hover mt-3">
            <thead class="table-dark">
                <tr>
                <th>ID Transaksi</th>
                <th>Waktu</th>
                <th>UID Anggota</th>
                <th>UID Buku</th>
                <th>Status</th>
                </tr>
            </thead>
            <tbody id="tbody-transaksi">
                <tr><td colspan="5" class="text-center">Memuat data...</td></tr>
            </tbody>
            </table>
        </div>

        <div class="tab-pane fade" id="buku" role="tabpanel">
            <h4>Katalog Buku</h4>
            <table class="table table-striped table-hover mt-3">
            <thead class="table-dark">
                <tr>
                <th>UID Buku</th>
                <th>Judul</th>
                <th>Penulis</th>
                <th>Status Tersedia</th>
                </tr>
            </thead>
            <tbody id="tbody-buku">
                <tr><td colspan="4" class="text-center">Memuat data...</td></tr>
            </tbody>
            </table>
        </div>

        <div class="tab-pane fade" id="anggota" role="tabpanel">
            <h4>Daftar Anggota</h4>
            <table class="table table-striped table-hover mt-3">
            <thead class="table-dark">
                <tr>
                <th>UID Anggota</th>
                <th>Nama</th>
                <th>Kelas</th>
                <th>Tanggal Daftar</th>
                </tr>
            </thead>
            <tbody id="tbody-anggota">
                <tr><td colspan="4" class="text-center">Memuat data...</td></tr>
            </tbody>
            </table>
        </div>

        </div>
    </div> <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Fungsi universal untuk merender array data ke dalam elemen tbody
        function renderTable(dataArray, tbodyId, columnCount) {
        const tbody = document.getElementById(tbodyId);
        tbody.innerHTML = ''; // Kosongkan tulisan "Memuat data..."

        if (dataArray.length === 0) {
            tbody.innerHTML = `<tr><td colspan="${columnCount}" class="text-center">Tidak ada data</td></tr>`;
            return;
        }

        dataArray.forEach(row => {
            let tr = document.createElement('tr');
            row.forEach(cell => {
            let td = document.createElement('td');
            td.textContent = cell;
            tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
        }

        // Fungsi memanggil backend untuk mengambil data masing-masing sheet
        function loadAllData() {
        // Panggil data Transaksi (5 kolom)
        google.script.run.withSuccessHandler(function(data) {
            renderTable(data, 'tbody-transaksi', 5);
        }).getTableData('Transaksi');

        // Panggil data Buku (4 kolom)
        google.script.run.withSuccessHandler(function(data) {
            renderTable(data, 'tbody-buku', 4);
        }).getTableData('Buku');

        // Panggil data Anggota (4 kolom)
        google.script.run.withSuccessHandler(function(data) {
            renderTable(data, 'tbody-anggota', 4);
        }).getTableData('Anggota');
        }

        // Jalankan loadAllData saat halaman pertama kali dimuat
        document.addEventListener("DOMContentLoaded", loadAllData);
    </script>
    </body>
</html>
